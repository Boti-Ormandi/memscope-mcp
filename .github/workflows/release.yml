# OIDC trusted publisher config (required for the publish step to work):
#   Owner:     Boti-Ormandi
#   Repo:      memscope-mcp
#   Workflow:  release.yml
#   Env:       'pypi' (production) and 'testpypi' (dry-run)
# Renaming any of the above silently breaks publishing. Update the PyPI
# trusted publisher entries at https://pypi.org/manage/account/publishing/
# before changing anything here.
#
# TestPyPI re-upload constraint: PyPI/TestPyPI reject re-uploads of identical
# filenames permanently. A workflow_dispatch dry-run targeting `testpypi` at a
# version already published there will fail. Bump the version (or skip the
# dry-run) when shipping patches.

name: release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'
  workflow_dispatch:
    inputs:
      target:
        description: Publish target
        required: true
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13', '3.14']
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test
        run: pytest tests/ -v
      - name: Lint
        run: |
          ruff check
          ruff format --check

  build:
    needs: [test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.13'
      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine
      - name: Build
        run: python -m build
      - name: Metadata check
        run: twine check dist/*
      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment:
      name: ${{ github.event_name == 'workflow_dispatch' && inputs.target || 'pypi' }}
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/
      - name: Publish to TestPyPI
        if: github.event_name == 'workflow_dispatch' && inputs.target == 'testpypi'
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
        with:
          repository-url: https://test.pypi.org/legacy/
      - name: Publish to PyPI
        if: github.event_name == 'push' || (github.event_name == 'workflow_dispatch' && inputs.target == 'pypi')
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b  # v1.14.0
